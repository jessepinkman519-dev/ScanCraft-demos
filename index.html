<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScanCraft Demo Builder</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
}

/* LEFT PANEL (INPUTS) */
#builder {
    width: 320px;
    padding: 20px;
    background: #111;
    color: white;
    height: 100vh;
    overflow-y: auto;
}

#builder h2 {
    margin-top: 0;
}

input, textarea {
    width: 100%;
    margin-bottom: 10px;
    padding: 8px;
    border: none;
    border-radius: 4px;
}

button {
    width: 100%;
    padding: 10px;
    background: #00c2ff;
    border: none;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

/* RIGHT SIDE (DEMO) */
#demo {
    flex: 1;
    padding: 20px;
    background: #f5f5f5;
}

/* PRODUCT CARD */
.product {
    max-width: 400px;
    margin: auto;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.product img {
    width: 100%;
}

.product-content {
    padding: 15px;
}

h1 {
    margin: 0 0 10px 0;
}
</style>
</head>

<body>

<!-- BUILDER -->
<div id="builder">
    <h2>ScanCraft Builder</h2>

    <label>Business Name</label>
    <input id="business" placeholder="Gemini Lounge">

    <label>Product Name</label>
    <input id="productName" placeholder="Signature Cocktail">

    <label>Description</label>
    <textarea id="description" placeholder="Describe the product..."></textarea>

    <label>Price</label>
    <input id="price" placeholder="$12">

    <label>Image URL</label>
    <input id="image" placeholder="Paste image link">

    <button onclick="applyData()">APPLY</button>
</div>

<!-- DEMO -->
<div id="demo">
    <div class="product">
        <img id="demoImage" src="https://via.placeholder.com/400x250">
        <div class="product-content">
            <h1 id="demoName">Product Name</h1>
            <p id="demoDesc">Description will appear here.</p>
            <strong id="demoPrice">$0.00</strong>
        </div>
    </div>
</div>

<script>
function applyData() {
    document.getElementById("demoName").innerText =
        document.getElementById("productName").value || "Product Name";

    document.getElementById("demoDesc").innerText =
        document.getElementById("description").value || "Description will appear here.";

    document.getElementById("demoPrice").innerText =
        document.getElementById("price").value || "$0.00";

    document.getElementById("demoImage").src =
        document.getElementById("image").value || "https://via.placeholder.com/400x250";
}
</script>

</body>
</html>
